            summary: Upload an image for message use
            security:
                - sessionCookie: []
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            properties:
                                file:
                                    type: string
                                    format: binary
            responses:
                "200":
                    description: Image uploaded
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    fileId:
                                        type: string
                                    fileUrl:
                                        type: string
                                        format: uri
                                required: [fileId, fileUrl]
                "400":
                    description: Invalid upload request (missing file, unsupported type, or malformed body)
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "403":
                    description: Forbidden - request origin is not allowed
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "413":
                    description: File too large
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "429":
                    description: Too many upload requests
                    headers:
                        Retry-After:
                            schema:
                                type: integer
                            description: Seconds until another upload attempt is allowed.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
        delete:
            tags: [Uploads]
            summary: Delete an uploaded image
            security:
                - sessionCookie: []
            parameters:
                - name: fileId
                  in: query
                  required: true
                  schema:
                      type: string
            responses:
                "200":
                    description: Image deleted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Success"
                "400":
                    description: Missing or invalid fileId
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "403":
                    description: Forbidden - request origin is not allowed or caller does not own the file
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "404":
                    description: Image not found
                    content:
                        application/json:
                            schema:
