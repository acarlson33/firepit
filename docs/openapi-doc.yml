    /api/inbox:
        get:
            tags: [Notifications]
            summary: Get unified unread inbox items and counts
            security:
                - sessionCookie: []
            parameters:
                - name: kind
                  in: query
                  description: Comma-separated list of inbox kinds
                  schema:
                      type: string
                      example: mention,thread
                - name: scope
                  in: query
                  description: Context scope filter for inbox results
                  schema:
                      type: string
                      enum: [all, direct, server]
                      default: all
                - name: limit
                  in: query
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 100
                - name: contextId
                  in: query
                  required: false
                  description: Context identifier. Must be provided together with contextKind for context-scoped inbox responses.
                  schema:
                      type: string
                - name: contextKind
                  in: query
                  required: false
                  description: Context discriminator. Must be provided together with contextId.
                  schema:
                      type: string
                      enum: [channel, conversation]
            responses:
                "200":
                    description: Inbox list response. When both contextId and contextKind are provided, returns the context-scoped variant.
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/InboxResponse"
                "400":
                    description: Invalid query parameters
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
        patch:
            tags: [Notifications]
            summary: Mark inbox items or contexts as read
            security:
                - sessionCookie: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            oneOf:
                                - type: object
                                  required: [itemIds]
                                  properties:
                                      itemIds:
                                          type: array
                                          minItems: 1
                                          maxItems: 50
                                          items:
                                              type: string
                                - type: object
                                  required: [action]
                                  properties:
                                      action:
                                          type: string
                                          enum: [mark-all-read]
                                      contextKind:
                                          type: string
                                          enum: [channel, conversation]
                                      contextId:
                                          type: string
            responses:
                "200":
                    description: Read state updated
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - type: object
                                      description: Response for itemIds-based read updates.
                                      properties:
                                          ok:
                                              type: boolean
                                          readAt:
                                              type: string
                                              format: date-time
                                          updatedCount:
                                              type: integer
                                          truncated:
                                              type: boolean
                                          truncatedCount:
                                              type: integer
                                    - type: object
                                      description: Response for mark-all-read updates.
                                      properties:
                                          ok:
                                              type: boolean
                                          readAt:
                                              type: string
                                              format: date-time
                                          updatedMentionCount:
                                              type: integer
                                          updatedThreadContextCount:
                                              type: integer
                "400":
                    description: Invalid request body
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "401":
                    description: Unauthorized
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

